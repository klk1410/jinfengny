server:
  port: 7267
  servlet:
    context-path: /app-api

spring:
  application:
    name: eco-oil-app-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:mem:envoil;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
  flyway:
    enabled: true
    locations: classpath:db/migration

# 与 admin-backend 必须使用同一数据库，门户与权限才一致；仅起单服务时内存 H2 亦可。
