# 宝塔站点配置参考：jinfengny.juneue.com
# 管理端静态：/www/wwwroot/jinfeng-admin  →  https://域名/admin/
# 客户端静态：/www/wwwroot/jinfeng-app    →  https://域名/app/
# 后端：admin 7266（/prod-api）、app 7267（/app-api），与 Spring Boot context-path 一致，无需 rewrite 去前缀
#
# 若 /app/、/admin/ 出现 403：
#  1) 确认目录内有 index.html；上级目录需可执行：chmod 755 /www /www/wwwroot /www/wwwroot/jinfeng-app
#  2) 宝塔运行用户一般为 www：chown -R www:www /www/wwwroot/jinfeng-app
#  3) 不要用 location /app/ { deny all; } 之类规则；站点「伪静态」勿覆盖上述 location
#
# 用法：将内容合并进宝塔「网站 → 设置 → 配置文件」，或保存为 vhost 后 nginx -t && nginx -s reload

server {
    listen 80;
    server_name jinfengny.juneue.com;

    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name jinfengny.juneue.com;

    ssl_certificate     /www/server/panel/vhost/cert/jinfengny.juneue.com/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/jinfengny.juneue.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 仅用于未命中下方专用 location 时的后备（如 / 或其它路径）
    root  /www/wwwroot/jinfengny.juneue.com;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    # 无尾部斜杠时统一跳到带斜杠 URL，避免匹配异常
    location = /admin {
        return 301 /admin/;
    }
    location = /app {
        return 301 /app/;
    }

    # 管理端 SPA（Vite base: /admin/）
    # 注意：alias + try_files 的最后一条若写 /admin/index.html，回退会按 server 的 root 解析，易 403，改用 @ 命名 location
    location ^~ /admin/ {
        alias /www/wwwroot/jinfeng-admin/;
        index index.html;
        try_files $uri $uri/ @admin_spa;
    }
    location @admin_spa {
        rewrite ^.*$ /admin/index.html last;
    }

    # 客户端 SPA（Vite base: /app/）
    location ^~ /app/ {
        alias /www/wwwroot/jinfeng-app/;
        index index.html;
        try_files $uri $uri/ @app_spa;
    }
    location @app_spa {
        rewrite ^.*$ /app/index.html last;
    }

    # 管理端 API（admin-backend：context-path /prod-api，端口 7266）
    location ^~ /prod-api/ {
        proxy_pass http://127.0.0.1:7266/prod-api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # 客户端 API（app-backend：context-path /app-api，端口 7267）
    location ^~ /app-api/ {
        proxy_pass http://127.0.0.1:7267/app-api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # 静态资源长缓存（按需保留；Vite 构建多为 /admin/assets/、/app/assets/）
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(html)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # 站点根路径：可改为落地页或跳到管理端
    location = / {
        return 302 /admin/;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
