# 单域名 + 路径：管理端 https://你的域名/admin/ ，客户端 https://你的域名/app/
# API 仍走同源 /prod-api、/app-api，由 Nginx 反代到本机两个 Spring Boot。
#
# 部署目录约定（与 root 一行一致）：
#   {root}/admin/   ← 将 admin-frontend 的 dist-admin/* 内容放到这里
#   {root}/app/     ← 将 app-frontend 的 dist-app/* 内容放到这里
#
# 修改：server_name、root、SSL 证书路径（若上 HTTPS）

server {
    listen 80;
    server_name example.com;

    # 部署根目录，其下必须有子目录 admin/、app/（内容分别为两次 npm run build 的产物）
    root /opt/eco-oil/www;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml;

    # 管理端 SPA（Vite base: /admin/）
    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    # 客户端 SPA（Vite base: /app/）
    location /app/ {
        try_files $uri $uri/ /app/index.html;
    }

    # 管理端 API（admin-backend，context-path /prod-api）
    location /prod-api/ {
        proxy_pass http://127.0.0.1:7266/prod-api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 客户端 API（app-backend，context-path /app-api）
    location /app-api/ {
        proxy_pass http://127.0.0.1:7267/app-api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 可选：根路径跳到管理端或落地页
    location = / {
        return 302 /admin/;
    }
}

